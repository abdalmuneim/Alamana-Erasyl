name: alamanaerasyl
description: A new Flutter project.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=2.19.4 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_localizations:
    sdk: flutter
  intl: ^0.18.0
  intl_utils: ^2.8.3

  get_it: ^7.2.0
  go_router: ^6.2.0
  provider: ^6.0.5
  http: ^0.13.5
  internet_connection_checker_plus: ^1.0.1

  shimmer: ^2.0.0
  lottie: ^2.2.0
  youtube_player_flutter: ^8.1.2
  cached_network_image: ^3.2.3
  firebase_core: ^2.7.1
  shared_preferences: ^2.0.18
  flutter_braintree: ^3.0.0
  new_version: ^0.3.1
  persistent_bottom_nav_bar: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

  change_app_package_name: ^1.1.0
  flutter_launcher_icons: ^0.12.0
flutter_icons:
  image_path_android: "assets/images/logo.png"
  image_path_ios: "assets/images/logo.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21

  web:
    generate: true
    image_path: "assets/image/logo.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

flutter_assets:
  assets_path: assets/
  output_path: lib/assets_manager/
  filename: assets.dart
flutter_intl:
  enabled: true
